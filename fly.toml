# fly.toml app configuration file generated for the-real-ones on 2026-03-07T05:50:22-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'the-real-ones'
primary_region = 'sjc'

[build]

[[mounts]]
  source = 'survey_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
